<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sumber Emisi - NAIMA Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Roboto", sans-serif;
        background-color: #f8f9fa;
      }
      .sidebar {
        width: 240px;
        background-color: #24b47e;
        color: white;
        height: 100vh;
        position: fixed;
      }
      .sidebar a {
        color: white;
        text-decoration: none;
      }
      .sidebar .nav-link:hover {
        background-color: rgba(255, 255, 255, 0.2);
      }
      .main-content {
        margin-left: 240px;
        padding: 20px;
      }
      .card {
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="sidebar d-flex flex-column p-3">
      <a href="index.html" class="text-white text-decoration-none">
        <img
          src="images/ns-white-color.png"
          alt="NAIMA Logo"
          style="width: 100%; height: auto"
        />
        <span class="brand-sub">Sustainability</span>
      </a>
      <hr class="text-white" />
      <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
          <a href="index.html" class="nav-link text-white"
            ><i class="bi bi-speedometer2 me-2"></i>Dashboard</a
          >
        </li>
        <li>
          <a href="sumber_emisi.html" class="nav-link text-white"
            ><i class="bi bi-cloud me-2"></i>Sumber Emisi</a
          >
        </li>
      </ul>
    </div>

    <div class="main-content">
      <h4>Sumber Emisi</h4>

      <!-- Form Input -->
      <div class="card">
        <div class="card-body">
          <form id="emissionForm">
            <div class="mb-3">
              <label for="emissionName" class="form-label"
                >Nama Sumber Emisi</label
              >
              <input
                type="text"
                class="form-control"
                id="emissionName"
                required
              />
            </div>
            <div class="mb-3">
              <label for="emissionCategory" class="form-label">Kategori</label>
              <select class="form-select" id="emissionCategory" required>
                <option value="">Pilih Kategori</option>
                <option>Transportasi</option>
                <option>Energi</option>
                <option>Limbah</option>
                <option>Proses Industri</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="emissionValue" class="form-label"
                >Nilai Emisi (kg CO₂e)</label
              >
              <input
                type="number"
                class="form-control"
                id="emissionValue"
                required
              />
            </div>
            <div class="mb-3">
              <label for="emissionDescription" class="form-label"
                >Deskripsi</label
              >
              <textarea
                class="form-control"
                id="emissionDescription"
                rows="3"
              ></textarea>
            </div>
            <button type="submit" class="btn btn-success">
              <i class="bi bi-save"></i> Simpan
            </button>
          </form>
        </div>
      </div>

      <!-- Tabel Emisi -->
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Daftar Sumber Emisi</h5>
          <div class="table-responsive">
            <table class="table table-bordered table-hover">
              <thead class="table-success text-center">
                <tr>
                  <th>No</th>
                  <th>Nama</th>
                  <th>Kategori</th>
                  <th>Nilai Emisi (kg CO₂e)</th>
                  <th>Deskripsi</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody
                id="emissionTableBody"
                class="align-middle text-center"
              ></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      const emissionForm = document.getElementById("emissionForm");
      const tableBody = document.getElementById("emissionTableBody");

      let emissions = [];
      let editIndex = -1;

      emissionForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.getElementById("emissionName").value;
        const category = document.getElementById("emissionCategory").value;
        const value = parseFloat(
          document.getElementById("emissionValue").value
        );
        const description = document.getElementById(
          "emissionDescription"
        ).value;

        if (editIndex === -1) {
          emissions.push({ name, category, value, description });
        } else {
          emissions[editIndex] = { name, category, value, description };
          editIndex = -1;
        }

        emissionForm.reset();
        renderTable();
      });

      function renderTable() {
        tableBody.innerHTML = "";
        emissions.forEach((emission, index) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${emission.name}</td>
            <td>${emission.category}</td>
            <td>${emission.value.toFixed(2)}</td>
            <td>${emission.description}</td>
            <td>
              <button class="btn btn-sm btn-warning me-2" onclick="editEmission(${index})">
                <i class="bi bi-pencil-square"></i> Edit
              </button>
              <button class="btn btn-sm btn-danger" onclick="deleteEmission(${index})">
                <i class="bi bi-trash"></i> Hapus
              </button>
            </td>
          `;
          tableBody.appendChild(row);
        });
      }

      function editEmission(index) {
        const emission = emissions[index];
        document.getElementById("emissionName").value = emission.name;
        document.getElementById("emissionCategory").value = emission.category;
        document.getElementById("emissionValue").value = emission.value;
        document.getElementById("emissionDescription").value =
          emission.description;
        editIndex = index;
      }

      function deleteEmission(index) {
        if (confirm("Yakin ingin menghapus data ini?")) {
          emissions.splice(index, 1);
          renderTable();
        }
      }
    </script>
  </body>
</html>
